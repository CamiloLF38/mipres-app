<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIPRES App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand fw-bold" href="/index.html">MIPRES App</a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
    
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/index.html">Inicio</a>
                        </li>
                    </ul>
                </div>
                
            </div>
        </nav>
    </header>

    <!-- BODY -->
    <main class="d-flex align-items-center justify-content-center register-form">
        <div class="card shadow-lg" style="width: 100%; max-width: 400px;">
            <div class="card-body p-4">
    
                <!-- Formulario inicio sesion -->
                <div id="login-section">
                    <h3 class="text-center mb-4">MIPRES Login</h3>
                    <form id="login-form">
                        <div class="mb-3">
                            <label class="form-label">Número de Cédula</label>
                            <input type="text" class="form-control" id="login-cedula" placeholder="Ej: 12345678" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="login-pass" placeholder="********" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">Iniciar Sesión</button>
                    </form>
                    <p class="text-center small">
                        ¿No tienes una cuenta? <a href="#" id="go-to-register">Regístrate aquí</a>
                    </p>
                </div>
    
                <!-- Formulario Registro usuario -->
                <div id="register-section" class="d-none">
                    <h3 class="text-center mb-4">Crear Cuenta</h3>
                    <form id="register-form">
                        <div class="mb-3">
                            <label class="form-label">Nombres:</label>
                            <input type="text" class="form-control" id="reg-nombres" placeholder="Juan" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Apellidos</label>
                            <input type="text" class="form-control" id="reg-apellidos" placeholder="Perez" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Cédula</label>
                            <input type="text" class="form-control" id="reg-cedula" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="reg-rol">Tipo de Usuario</label>
                            <select class="form-select" id="reg-rol">
                                <option value="" selected disabled>Selecciona una opción...</option>
                                <option value="Cuidador">Cuidador</option>
                                <option value="Paciente">Paciente</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="reg-pass" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirmar Contraseña</label>
                            <input type="password" class="form-control" id="reg-confirmacion-pass" required>
                            <div id="error-pass" class="text-danger small mt-1 d-none">
                                Las contraseñas no coinciden.
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">Registrarse</button>
                    </form>
                    <p class="text-center small">
                        ¿Ya tienes cuenta? <a href="#" id="go-to-login">Inicia sesión</a>
                    </p>
                </div>
    
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="py-4">
        <div class="container text-center">
            <small>© 2026 MIPRES App — Prototipo</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/registro.js"></script>
</body>
</html>
